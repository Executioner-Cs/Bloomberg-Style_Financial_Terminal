# SonarCloud project configuration
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

sonar.projectKey=Executioner-Cs_Bloomberg-Style_Financial_Terminal
sonar.organization=executioner-cs

# ---------------------------------------------------------------------------
# Copy-Paste Detection (CPD) exclusions
#
# The worker service (services/worker/) is an intentional architectural copy
# of parts of the API service. CLAUDE.md Part VIII explicitly prohibits
# cross-service imports — the two services are separate Python packages and
# must not share source files. Code that appears in both services is
# duplicated by design, not by accident.
#
# Test files are also excluded: fixture factories, mock setup, and assertion
# patterns naturally repeat across independent test suites and do not
# represent unintentional duplication.
# ---------------------------------------------------------------------------
sonar.cpd.exclusions=services/worker/**,**/tests/**
