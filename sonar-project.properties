# SonarCloud project configuration — used by CI-based analysis (sonar-scanner).
# Automatic GitHub App analysis does NOT read this file; CI-based analysis does.
# See: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/

sonar.projectKey=Executioner-Cs_Bloomberg-Style_Financial_Terminal
sonar.organization=executioner-cs

sonar.sources=services/api/src,services/worker/src,apps/web/src,packages
sonar.tests=services/api/tests,services/worker/tests,apps/web/src

# ---------------------------------------------------------------------------
# Coverage exclusions
#
# Barrel re-exports (index.tsx/index.ts — single re-export lines) and
# test setup files contain no executable logic and inflate uncovered-line
# counts. Excluding them gives an accurate picture of real coverage gaps.
#
# Test files (*.test.ts/tsx) are source in sonar.sources because SonarCloud
# needs them for duplication analysis, but they must be excluded from coverage
# reporting — test code is never "covered" by itself.
# ---------------------------------------------------------------------------
sonar.coverage.exclusions=\
  apps/web/src/**/*.test.tsx,\
  apps/web/src/**/*.test.ts,\
  apps/web/src/test-setup.ts,\
  apps/web/src/**/index.tsx,\
  apps/web/src/**/index.ts,\
  packages/**/*.tsx,\
  packages/**/*.ts,\
  apps/web/src/main.tsx,\
  apps/web/src/router.tsx

# ---------------------------------------------------------------------------
# Copy-Paste Detection (CPD) exclusions
#
# The worker service is an intentional architectural copy of parts of the API
# service. CLAUDE.md Part VIII explicitly prohibits cross-service imports —
# the two services are separate Python packages and must not import from each
# other. Code that appears in both services is duplicated by design.
#
# Test files are also excluded: fixture patterns repeat across suites.
# ---------------------------------------------------------------------------
sonar.cpd.exclusions=\
  services/worker/src/**/*.py,\
  services/api/tests/**/*.py,\
  services/worker/tests/**/*.py

sonar.python.version=3.12

# Coverage reports generated by pytest-cov in the SonarCloud CI job.
sonar.python.coverage.reportPaths=services/api/coverage.xml,services/worker/coverage.xml

# Frontend coverage report generated by vitest --coverage (v8 provider, lcov reporter).
# Vitest writes to apps/web/coverage/lcov.info by default.
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
